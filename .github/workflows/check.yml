name: Tablecheck 空き枠チェック

on:
  schedule:
    - cron: "*/10 22-23 * * *"  # JST 7:00-8:59（UTC 22-23時）
    - cron: "*/10 0-15 * * *"   # JST 9:00-24:00（UTC 0-15時）
  workflow_dispatch:        # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 状態キャッシュを復元
        uses: actions/cache@v4
        with:
          path: state.json
          key: tablecheck-state-${{ github.run_id }}
          restore-keys: tablecheck-state-

      - name: 依存パッケージインストール
        run: pip install requests

      - name: 空き枠チェック
        run: python check_availability.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
